<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elefeed Test Suite</title>
  <link rel="icon" href="../favicon-dev.svg" />

  <!-- Load production stylesheets -->
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/drawers.css" />
  <link rel="stylesheet" href="../css/compose.css" />
  <link rel="stylesheet" href="../css/posts.css" />
  <link rel="stylesheet" href="../css/hashtags.css" />
  <link rel="stylesheet" href="../css/trending.css" />
  <link rel="stylesheet" href="../css/login.css" />
  <link rel="stylesheet" href="../css/search.css" />

  <style>
    /* Test suite specific styles */
    html[data-theme="light"] {
      --test-bg: #f4f4f7;
      --test-border: #9b7fff;
      --test-text: #1d1d24;
      --test-header: #e8e8f0;
    }

    html:not([data-theme="light"]) {
      --test-bg: #0d0d0f;
      --test-border: #9b7fff;
      --test-text: #e8e8f0;
      --test-header: #1a1a1e;
    }

    #test-panel {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--test-bg);
      color: var(--test-text);
      border: none;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    #test-panel-header {
      padding: 20px 24px;
      background: var(--test-header);
      border-bottom: 2px solid var(--test-border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .test-header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #test-panel-title {
      font-size: 18px;
      font-weight: bold;
      color: var(--test-border);
      letter-spacing: 0.3px;
    }

    #test-panel-status {
      font-size: 13px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(155, 127, 255, 0.1);
    }

    #test-panel-status.running {
      color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
      animation: pulse-running 1.5s ease-in-out infinite;
    }

    @keyframes pulse-running {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    #test-panel-status.passed {
      color: #4ade80;
      background: rgba(74, 222, 128, 0.1);
    }

    #test-panel-status.failed {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }

    .test-progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(155, 127, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
    }

    .test-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #9b7fff, #7c3aed);
      width: 0%;
      transition: width 0.3s ease;
    }

    .test-stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
      padding: 8px 0;
      align-items: center;
    }

    .test-stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .test-stat-label {
      opacity: 0.7;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      font-size: 10px;
    }

    .test-stat-value {
      font-weight: bold;
      font-size: 13px;
    }

    .test-stat.tests {
      color: #3b82f6;
    }

    .test-stat.passed {
      color: #4ade80;
    }

    .test-stat.failed {
      color: #ef4444;
    }

    #test-results {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    .test-result-item {
      margin-bottom: 12px;
      padding: 10px 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      border-radius: 4px;
      background: rgba(155, 127, 255, 0.05);
      border-left: 3px solid transparent;
      transition: background 0.2s ease;
    }

    .test-result-item.passed {
      color: #4ade80;
      border-left-color: #4ade80;
      background: rgba(74, 222, 128, 0.08);
    }

    .test-result-item.passed:hover {
      background: rgba(74, 222, 128, 0.12);
    }

    .test-result-item.failed {
      color: #ef4444;
      border-left-color: #ef4444;
      background: rgba(239, 68, 68, 0.08);
    }

    .test-result-item.failed:hover {
      background: rgba(239, 68, 68, 0.12);
    }

    .test-result-item.pending {
      color: #3b82f6;
      border-left-color: #3b82f6;
      background: rgba(59, 130, 246, 0.08);
    }

    .test-result-icon {
      flex-shrink: 0;
      width: 16px;
      text-align: center;
      font-weight: bold;
      font-size: 14px;
      margin-top: 2px;
    }

    .test-result-text {
      flex: 1;
      word-break: break-word;
      font-weight: 500;
    }

    .test-result-error {
      margin-top: 8px;
      margin-left: 0;
      padding: 8px 10px;
      font-size: 11px;
      color: #f97316;
      background: rgba(249, 115, 22, 0.08);
      border-radius: 3px;
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
      line-height: 1.5;
      max-width: 100%;
      overflow-x: auto;
    }

    .test-suite-container {
      margin-bottom: 16px;
      border-left: 3px solid var(--test-border);
      padding-left: 12px;
    }

    .test-suite-header {
      font-weight: 600;
      color: var(--test-border);
      margin-bottom: 8px;
      padding: 12px 8px;
      user-select: none;
      transition: all 0.2s;
      cursor: pointer;
      border-radius: 4px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .test-suite-header:hover {
      opacity: 0.85;
      background: rgba(155, 127, 255, 0.08);
    }

    .test-suite-toggle {
      display: inline-block;
      margin-right: 8px;
      width: 12px;
      text-align: center;
      transition: transform 0.2s ease;
    }

    .test-suite-tests {
      padding-left: 8px;
      margin-left: 4px;
      border-left: 1px solid rgba(155, 127, 255, 0.3);
    }

    .test-suite-tests .test-result-item {
      margin-bottom: 8px;
      padding: 8px 10px;
      font-size: 12px;
    }

    #test-summary {
      padding: 20px 24px;
      background: var(--test-header);
      border-top: 2px solid var(--test-border);
      font-weight: 700;
      font-size: 15px;
      text-align: center;
      letter-spacing: 0.3px;
    }

    #test-summary.all-passed {
      color: #4ade80;
      background: linear-gradient(135deg, rgba(74, 222, 128, 0.08), rgba(34, 197, 94, 0.08));
    }

    #test-summary.has-failures {
      color: #ef4444;
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.08), rgba(220, 38, 38, 0.08));
    }
  </style>
</head>

<body>
  <!-- Keep this to load the actual app -->
  <div id="app-container">
    <!-- App UI will be loaded here -->
  </div>

  <!-- Test panel -->
  <div id="test-panel">
    <div id="test-panel-header">
      <div class="test-header-top">
        <div id="test-panel-title">🧪 Elefeed Test Suite</div>
        <div id="test-panel-status" class="running">Running...</div>
      </div>
      <div class="test-progress-bar">
        <div class="test-progress-fill"></div>
      </div>
      <div class="test-stats">
        <div class="test-stat tests">
          <span class="test-stat-label">Tests</span>
          <span class="test-stat-value" id="test-stat-total">0</span>
        </div>
        <div class="test-stat passed">
          <span class="test-stat-label">Passed</span>
          <span class="test-stat-value" id="test-stat-passed">0</span>
        </div>
        <div class="test-stat failed">
          <span class="test-stat-label">Failed</span>
          <span class="test-stat-value" id="test-stat-failed">0</span>
        </div>
      </div>
    </div>
    <div id="test-results"></div>
    <div id="test-summary"></div>
  </div>

  <script type="module">
    // Load and run tests
    // (Tests will verify production HTML exists and has correct structure)
    import('./test-scenarios.js').catch(err => {
      console.error('Failed to load test scenarios:', err);
      const status = document.getElementById('test-panel-status');
      if (status) {
        status.textContent = 'Error loading tests';
        status.className = 'failed';
      }
    });
  </script>
</body>

</html>
