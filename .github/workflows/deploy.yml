name: Deploy to GitHub Pages (versioned)

on:
  push:
    branches: ["master"]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Inject Version and Imports
        run: |
          VERSION=$(date -u +'%Y.%m.%d').${{ github.run_number }}
          echo "Bumping version to $VERSION"
          sed -i "s/CLIENT_VERSION = '0.0.0-dev'/CLIENT_VERSION = '$VERSION'/g" js/state.js
          sed -i "s/0.0.0-dev/$VERSION/g" index.html
          # Ensure giphy.js is included in the bundle
          echo "import './giphy.js';" >> js/app.js

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
